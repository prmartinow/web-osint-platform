name: web-osint-platform

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: web-osint-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "2"
      - --memory
      - 2G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://web-osint-redpanda:9092,external://127.0.0.1:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://web-osint-redpanda:8082,external://127.0.0.1:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - web-osint-redpanda:33145
    ports:
      - "127.0.0.1:19092:19092"
      - "127.0.0.1:18081:18081"
      - "127.0.0.1:18082:18082"
      - "127.0.0.1:19644:9644"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: *true'"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  typesense:
    image: typesense/typesense:30.0
    container_name: web-osint-typesense
    env_file:
      - ../.env
    command:
      - --data-dir
      - /data
      - --api-key
      - ${TYPESENSE_API_KEY}
      - --listen-port
      - "8108"
      - --enable-cors
    ports:
      - "127.0.0.1:18108:8108"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/typesense:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: web-osint-qdrant
    ports:
      - "127.0.0.1:16333:6333"
      - "127.0.0.1:16334:6334"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/qdrant:/qdrant/storage
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: web-osint-clickhouse
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_DB: web_osint
      CLICKHOUSE_USER: web_osint
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/clickhouse/data:/var/lib/clickhouse
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/clickhouse/logs:/var/log/clickhouse-server
    restart: unless-stopped

  normalizer:
    build:
      context: ../workers/normalizer
    container_name: web-osint-normalizer
    env_file:
      - ../.env
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_GROUP_ID: web-osint-normalizer-v1
      KAFKA_BROKERS: web-osint-redpanda:9092
      KAFKA_GROUP_ID: web-osint-normalizer-v1
      TYPESENSE_URL: http://web-osint-typesense:8108
      QDRANT_URL: http://web-osint-qdrant:6333
      QDRANT_COLLECTION: web_osint_evidence_v1
      CLICKHOUSE_URL: http://web-osint-clickhouse:8123
      CLICKHOUSE_DATABASE: web_osint
      CLICKHOUSE_USER: web_osint
      PEBBLE_DIR: /data/pebble
      HTTP_ADDR: :8090
      WEB_OSINT_EMIT_OBSERVED_TOPICS: ${WEB_OSINT_EMIT_OBSERVED_TOPICS:-true}
    ports:
      - "127.0.0.1:18090:8090"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/state/pebble:/data/pebble
    depends_on:
      - redpanda
      - typesense
      - qdrant
      - clickhouse
    restart: unless-stopped

  research-planner:
    build:
      context: ../workers/research-planner
    container_name: web-osint-research-planner
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: http://web-osint-clickhouse:8123
      CLICKHOUSE_DATABASE: web_osint
      CLICKHOUSE_USER: web_osint
      REDPANDA_PROXY_URL: http://web-osint-redpanda:8082
      HTTP_ADDR: :8092
      RESEARCH_PLANNER_INTERVAL_SECONDS: "300"
      RESEARCH_PLANNER_LOOKBACK_HOURS: "24"
      RESEARCH_PLANNER_CANDIDATE_LIMIT: "250"
    ports:
      - "127.0.0.1:18091:8092"
    depends_on:
      - redpanda
      - clickhouse
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
    container_name: web-osint-dashboard
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: http://127.0.0.1:18123
      CLICKHOUSE_DATABASE: web_osint
      CLICKHOUSE_USER: web_osint
      TYPESENSE_URL: http://127.0.0.1:18108
      QDRANT_URL: http://127.0.0.1:16333
      QDRANT_COLLECTION: web_osint_evidence_v1
      QWEN_INFERENCE_URL: ${QWEN_INFERENCE_URL:-http://127.0.0.1:18200}
      EMBEDDING_WORKER_URL: ${EMBEDDING_WORKER_URL:-http://127.0.0.1:18201}
      MEDIA_ROUTER_URL: ${MEDIA_ROUTER_URL:-http://127.0.0.1:18211}
      MEDIA_OCR_WORKER_URL: ${MEDIA_OCR_WORKER_URL:-http://127.0.0.1:18212}
      MEDIA_VL_WORKER_URL: ${MEDIA_VL_WORKER_URL:-http://127.0.0.1:18213}
      WEB_OSINT_MODELS_DIR: ${WEB_OSINT_MODELS_DIR:-/mnt/data/web-osint-platform/models}
      NORMALIZER_URL: http://127.0.0.1:18090
      RESEARCH_PLANNER_URL: http://127.0.0.1:18091
      REDPANDA_PROXY_URL: http://127.0.0.1:18082
      REDPANDA_ADMIN_URL: http://127.0.0.1:19644
      MEDIA_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/media
      OCR_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/ocr
      DASHBOARD_HOST: ${WEB_OSINT_DASHBOARD_BIND:-127.0.0.1}
      DASHBOARD_PORT: "18191"
    network_mode: host
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}:${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}:ro
      - ${WEB_OSINT_MODELS_DIR:-/mnt/data/web-osint-platform/models}:${WEB_OSINT_MODELS_DIR:-/mnt/data/web-osint-platform/models}:ro
    depends_on:
      - redpanda
      - typesense
      - qdrant
      - clickhouse
      - normalizer
      - research-planner
    restart: unless-stopped

  research-ui:
    build:
      context: ../research-ui
    container_name: web-osint-research-ui
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: http://127.0.0.1:18123
      CLICKHOUSE_DATABASE: web_osint
      CLICKHOUSE_USER: web_osint
      WEB_OSINT_DATA_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}
      MEDIA_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/media
      OCR_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/ocr
      WEB_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/web
      DERIVED_ROOT: ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}/derived
      RESEARCH_UI_HOST: ${WEB_OSINT_RESEARCH_UI_BIND:-127.0.0.1}
      RESEARCH_UI_PORT: "18192"
    network_mode: host
    volumes:
      - ${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}:${WEB_OSINT_DATA_ROOT:-/mnt/data/web-osint-platform}:ro
    depends_on:
      - clickhouse
    restart: unless-stopped

  redpanda-connect-shadow:
    build:
      context: ../connect
    container_name: web-osint-connect-shadow
    profiles:
      - shadow
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_CONNECT_SHADOW_GROUP: web-osint-connect-shadow-v1
    ports:
      - "127.0.0.1:14195:4195"
    depends_on:
      - redpanda
    restart: unless-stopped

  redpanda-connect-production:
    build:
      context: ../connect
    container_name: web-osint-connect-production
    profiles:
      - production-routing
    command: ["-c", "/pipelines/capture-production-observed.yaml"]
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_CONNECT_PRODUCTION_GROUP: web-osint-connect-production-v1
    ports:
      - "127.0.0.1:14194:4195"
    depends_on:
      - redpanda
    restart: unless-stopped
