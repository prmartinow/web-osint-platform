logger:
  level: INFO
  format: logfmt

metrics:
  prometheus: {}

http:
  enabled: true
  address: 0.0.0.0:4195

input:
  label: capture_events
  # Redpanda Connect v4.46 exposes Redpanda topic I/O through the
  # kafka_franz component. This still targets Redpanda's data plane; the
  # Kafka-compatible protocol name is an implementation detail.
  kafka_franz:
    seed_brokers:
      - ${REDPANDA_BROKERS:web-osint-redpanda:9092}
    topics:
      - evidence.capture.events.v1
    consumer_group: ${REDPANDA_CONNECT_PRODUCTION_GROUP:web-osint-connect-production-v1}
    start_from_oldest: false
    auto_replay_nacks: false

pipeline:
  threads: 1
  processors:
    - mapping: |
        meta shadow_output_topic = "evidence.index.errors.v1"
        meta shadow_output_key = metadata("kafka_key")
        meta routing_pipeline = "capture-production-observed"
    - capture_envelope_validate: {}
    - source_kind_router: {}
    - observed_event_projector:
        mode: production
        include_validated: false
    - media_enrichment_request_builder:
        mode: production
    - catch:
        - dlq_error_enricher:
            pipeline_name: "capture-production-observed"
            output_topic: "evidence.index.errors.v1"
            error_class: "redpanda_connect_production"

output:
  kafka_franz:
    seed_brokers:
      - ${REDPANDA_BROKERS:web-osint-redpanda:9092}
    topic: ${! metadata("shadow_output_topic") }
    key: ${! metadata("shadow_output_key") }
    max_in_flight: 16
