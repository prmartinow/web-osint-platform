name: web-osint-platform

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "2"
      - --memory
      - 2G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://web-osint-redpanda:9092,external://${REDPANDA_EXTERNAL_ADVERTISE_HOST:?set REDPANDA_EXTERNAL_ADVERTISE_HOST}:${WEB_OSINT_REDPANDA_BROKER_PORT:?set WEB_OSINT_REDPANDA_BROKER_PORT}
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://web-osint-redpanda:8082,external://${REDPANDA_EXTERNAL_ADVERTISE_HOST:?set REDPANDA_EXTERNAL_ADVERTISE_HOST}:${WEB_OSINT_PANDAPROXY_PORT:?set WEB_OSINT_PANDAPROXY_PORT}
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr
      - 0.0.0.0:33145
      - --advertise-rpc-addr
      - web-osint-redpanda:33145
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_REDPANDA_BROKER_PORT:?set WEB_OSINT_REDPANDA_BROKER_PORT}:19092"
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_SCHEMA_REGISTRY_PORT:?set WEB_OSINT_SCHEMA_REGISTRY_PORT}:18081"
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_PANDAPROXY_PORT:?set WEB_OSINT_PANDAPROXY_PORT}:18082"
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_REDPANDA_ADMIN_PORT:?set WEB_OSINT_REDPANDA_ADMIN_PORT}:9644"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/redpanda:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy: *true'"]
      interval: 20s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  typesense:
    image: typesense/typesense:30.0
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-typesense
    env_file:
      - ../.env
    command:
      - --data-dir
      - /data
      - --api-key
      - ${TYPESENSE_API_KEY}
      - --listen-port
      - "8108"
      - --enable-cors
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_TYPESENSE_PORT:?set WEB_OSINT_TYPESENSE_PORT}:8108"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/typesense:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-qdrant
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_QDRANT_HTTP_PORT:?set WEB_OSINT_QDRANT_HTTP_PORT}:6333"
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_QDRANT_GRPC_PORT:?set WEB_OSINT_QDRANT_GRPC_PORT}:6334"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/qdrant:/qdrant/storage
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-clickhouse
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_DB: web_osint
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-web_osint}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_CLICKHOUSE_HTTP_PORT:?set WEB_OSINT_CLICKHOUSE_HTTP_PORT}:8123"
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_CLICKHOUSE_NATIVE_PORT:?set WEB_OSINT_CLICKHOUSE_NATIVE_PORT}:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/clickhouse/data:/var/lib/clickhouse
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/clickhouse/logs:/var/log/clickhouse-server
    restart: unless-stopped

  normalizer:
    build:
      context: ../workers/normalizer
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-normalizer
    env_file:
      - ../.env
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_GROUP_ID: web-osint-normalizer-v1
      KAFKA_BROKERS: web-osint-redpanda:9092
      KAFKA_GROUP_ID: web-osint-normalizer-v1
      TYPESENSE_URL: http://web-osint-typesense:8108
      QDRANT_URL: http://web-osint-qdrant:6333
      QDRANT_COLLECTION: web_osint_evidence_v1
      CLICKHOUSE_URL: http://web-osint-clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-web_osint}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-web_osint}
      PEBBLE_DIR: /data/pebble
      HTTP_ADDR: :8090
      WEB_OSINT_EMIT_OBSERVED_TOPICS: ${WEB_OSINT_EMIT_OBSERVED_TOPICS:-true}
      WEB_OSINT_ENABLE_MAINTENANCE_DELETE: ${WEB_OSINT_ENABLE_MAINTENANCE_DELETE:-false}
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_NORMALIZER_PORT:?set WEB_OSINT_NORMALIZER_PORT}:8090"
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/state/pebble:/data/pebble
    depends_on:
      - redpanda
      - typesense
      - qdrant
      - clickhouse
    restart: unless-stopped

  research-planner:
    build:
      context: ../workers/research-planner
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-research-planner
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: http://web-osint-clickhouse:8123
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-web_osint}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-web_osint}
      REDPANDA_PROXY_URL: http://web-osint-redpanda:8082
      HTTP_ADDR: :8092
      RESEARCH_PLANNER_INTERVAL_SECONDS: "300"
      RESEARCH_PLANNER_LOOKBACK_HOURS: "24"
      RESEARCH_PLANNER_CANDIDATE_LIMIT: "250"
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_RESEARCH_PLANNER_PORT:?set WEB_OSINT_RESEARCH_PLANNER_PORT}:8092"
    depends_on:
      - redpanda
      - clickhouse
    restart: unless-stopped

  dashboard:
    build:
      context: ../dashboard
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-dashboard
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:?set CLICKHOUSE_URL}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-web_osint}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-web_osint}
      TYPESENSE_URL: ${TYPESENSE_URL:?set TYPESENSE_URL}
      QDRANT_URL: ${QDRANT_URL:?set QDRANT_URL}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-web_osint_evidence_v1}
      LOCAL_INFERENCE_URL: ${LOCAL_INFERENCE_URL:?set LOCAL_INFERENCE_URL}
      EMBEDDING_WORKER_URL: ${EMBEDDING_WORKER_URL:?set EMBEDDING_WORKER_URL}
      MEDIA_ROUTER_URL: ${MEDIA_ROUTER_URL:?set MEDIA_ROUTER_URL}
      MEDIA_OCR_WORKER_URL: ${MEDIA_OCR_WORKER_URL:?set MEDIA_OCR_WORKER_URL}
      MEDIA_VL_WORKER_URL: ${MEDIA_VL_WORKER_URL:?set MEDIA_VL_WORKER_URL}
      NORMALIZER_URL: ${NORMALIZER_URL:?set NORMALIZER_URL}
      RESEARCH_PLANNER_URL: ${RESEARCH_PLANNER_URL:?set RESEARCH_PLANNER_URL}
      REDPANDA_PROXY_URL: ${PANDAPROXY_URL:?set PANDAPROXY_URL}
      REDPANDA_ADMIN_URL: ${REDPANDA_ADMIN_URL:?set REDPANDA_ADMIN_URL}
      MEDIA_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/media
      OCR_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/ocr
      DASHBOARD_HOST: ${WEB_OSINT_DASHBOARD_BIND:-127.0.0.1}
      DASHBOARD_PORT: "18191"
    network_mode: host
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}:${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}:ro
    depends_on:
      - redpanda
      - typesense
      - qdrant
      - clickhouse
      - normalizer
      - research-planner
    restart: unless-stopped

  research-ui:
    build:
      context: ../research-ui
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-research-ui
    env_file:
      - ../.env
    environment:
      CLICKHOUSE_URL: ${CLICKHOUSE_URL:?set CLICKHOUSE_URL}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE:-web_osint}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-web_osint}
      WEB_OSINT_DATA_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}
      MEDIA_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/media
      OCR_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/ocr
      WEB_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/web
      DERIVED_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/derived
      REVIEW_ROOT: ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/review
      RESEARCH_UI_HOST: ${WEB_OSINT_RESEARCH_UI_BIND:-127.0.0.1}
      RESEARCH_UI_PORT: "18192"
    network_mode: host
    volumes:
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}:${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}:ro
      - ${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/review:${WEB_OSINT_DATA_ROOT:?set WEB_OSINT_DATA_ROOT}/review:rw
    depends_on:
      - clickhouse
    restart: unless-stopped

  redpanda-connect-shadow:
    build:
      context: ../connect
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-connect-shadow
    profiles:
      - shadow
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_CONNECT_SHADOW_GROUP: web-osint-connect-shadow-v1
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_CONNECT_SHADOW_PORT:?set WEB_OSINT_CONNECT_SHADOW_PORT}:4195"
    depends_on:
      - redpanda
    restart: unless-stopped

  redpanda-connect-production:
    build:
      context: ../connect
    container_name: ${WEB_OSINT_CONTAINER_PREFIX:-web-osint}-connect-production
    profiles:
      - production-routing
    command: ["-c", "/pipelines/capture-production-observed.yaml"]
    environment:
      REDPANDA_BROKERS: web-osint-redpanda:9092
      REDPANDA_CONNECT_PRODUCTION_GROUP: web-osint-connect-production-v1
    ports:
      - "${WEB_OSINT_HOST_BIND:?set WEB_OSINT_HOST_BIND}:${WEB_OSINT_CONNECT_SHADOW_P1P2_PORT:?set WEB_OSINT_CONNECT_SHADOW_P1P2_PORT}:4195"
    depends_on:
      - redpanda
    restart: unless-stopped
