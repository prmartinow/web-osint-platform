name: sanity

on:
  push:
  pull_request:

jobs:
  public-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.12"
      - run: scripts/check_public_sanity.sh
